<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>JSON Viewer – Hyperspace Runtime</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Modular CSS -->
    <link rel="stylesheet" href="../portal-core.css">
</head>

<body>

<div id="header"></div>
<script>
fetch("/header.html")
    .then(r => r.text())
    .then(h => document.getElementById("header").innerHTML = h);
</script>

<div class="grid-overlay">
    <div></div><div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div><div></div>
</div>
<button onclick="toggleGrid()" style="position:fixed;top:10px;right:10px;z-index:10000;">Grid</button>
<script src="../grid-toggle.js"></script>

<div class="wrap">

    <h1>JSON Viewer</h1>
    <p class="lead">Hyperspace Runtime JSON anzeigen</p>

    <div id="super-nav"></div>
    <script>
    fetch("../genesis/super-nav.html")
        .then(r => r.text())
        .then(h => document.getElementById("super-nav").innerHTML = h);
    </script>

    <div class="card view-json">
        <select id="jsonSelect">
            <option value="https://hyperspace.corecraftgenesis.ch/runtime.json">runtime.json</option>
        </select>

        <pre id="jsonOutput">JSON wird geladen…</pre>
    </div>

    <div class="footer">
        © CoreCraft Genesis — audit‑sealed
    </div>

</div>

<script>
(function() {
    const select = document.getElementById('jsonSelect');
    const output = document.getElementById('jsonOutput');

    function loadJSON(url) {
        output.textContent = 'JSON wird geladen…';
        fetch(url)
            .then(r => r.text())
            .then(t => output.textContent = t)
            .catch(e => output.textContent = 'Fehler: ' + e);
    }

    select.addEventListener('change', () => loadJSON(select.value));
    loadJSON(select.value);
})();
</script>

</body>
</html>
