<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>JSON Viewer – DNSSeed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../portal.css">
</head>

<body>

<head>
    <meta charset="UTF-8">
    <title>DNSSeed – CoreCraft Genesis Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS: CORE + DNSSEED -->
    <link rel="stylesheet" href="../portal-core.css">
    <link rel="stylesheet" href="../portal-dnsseed.css">
</head>

<div class="grid-overlay"></div>

<div class="wrap">

    <h1>JSON Viewer</h1>
    <p class="lead">manifest.json anzeigen</p>

    <div class="card">
        <select id="jsonSelect">
            <option value="https://dnsseed.corecraftgenesis.ch/manifest.json">manifest.json</option>
        </select>

        <pre id="jsonOutput">JSON wird geladen…</pre>
    </div>

</div>

<script>
(function() {
    const select = document.getElementById('jsonSelect');
    const output = document.getElementById('jsonOutput');

    function loadJSON(file) {
        output.textContent = 'JSON wird geladen…';
        fetch(file)
            .then(r => r.json())
            .then(j => output.textContent = JSON.stringify(j, null, 2))
            .catch(e => output.textContent = 'Fehler: ' + e);
    }

    select.addEventListener('change', () => loadJSON(select.value));
    loadJSON(select.value);
})();
</script>

</body>
</html>
